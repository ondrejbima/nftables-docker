#!/usr/sbin/nft -f

# 1. Pokud tabulka inet filter a nat existuje, tak ji promaž. Pokud ne, vytvoř ji.
add table inet filter
flush table inet filter

add table inet nat
flush table inet nat

define is_docker = 0x00010000
define is_tailscale = 0x00000400

table inet filter {
    # Chain plneny events skriptem: nastavuje Docker mark bit pro pakety z Docker bridge
    # rozhrani v input ceste (Docker child chainy bezi jen na forward hook).
    chain docker-mark-input {
        # pravidla injectovana dynamicky pres nftables-docker-events.service
    }

    # Centralni allowlist pro sluzby dostupne z verejneho internetu.
    # Pouziva ct original proto-dst, takze stejne funguje pro:
    # - nativni aplikace na hostu (input)
    # - Docker published porty po DNAT (forward)
    chain internet-services {
        # SSH z internetu
        meta l4proto tcp ct original proto-dst 22 accept

        # Web
        meta l4proto tcp ct original proto-dst { 80,443 } accept
        meta l4proto udp ct original proto-dst 443 accept

        # OpenVPN
        meta l4proto udp ct original proto-dst 1201-1205 accept

        # Headscale STUN
        meta l4proto udp ct original proto-dst 3478 accept

        # Tailscale WireGuard
        meta l4proto udp ct original proto-dst 41641 accept

        # Priklad: povolit port 8080 jen z konkretni verejne IP
        # ip saddr 8.8.8.8 meta l4proto tcp ct original proto-dst 8080 accept

        # Vsechny ostatni nove TCP/UDP sluzby z internetu zahod.
        meta l4proto { tcp, udp } log prefix "nftables-internet-drop: " flags all counter drop
    }

    # Spolecny blok pro Docker -> Tailscale.
    # V input ceste znamena: Docker paket smeruje na Tailscale IP tohoto hostu.
    # Ve forward ceste znamena: Docker paket smeruje na tailscale0.
    chain docker-to-tailscale {
        meta mark & $is_docker == $is_docker ip daddr 100.100.188.1 log prefix "nftables-docker-tailscale-drop: " flags all counter drop
        meta mark & $is_docker == $is_docker ip6 daddr fd7a:115c:a1e0:188::1 log prefix "nftables-docker-tailscale-drop: " flags all counter drop
        ct mark & $is_docker == $is_docker ip daddr 100.100.188.1 log prefix "nftables-docker-tailscale-drop: " flags all counter drop
        ct mark & $is_docker == $is_docker ip6 daddr fd7a:115c:a1e0:188::1 log prefix "nftables-docker-tailscale-drop: " flags all counter drop
        oifname "tailscale0" meta mark & $is_docker == $is_docker log prefix "nftables-docker-tailscale-drop: " flags all counter drop
        oifname "tailscale0" ct mark & $is_docker == $is_docker log prefix "nftables-docker-tailscale-drop: " flags all counter drop
    }

    chain input {
        type filter hook input priority 0; policy drop;

        # povolit spojení již navázaná nebo related
        ct state established,related accept

        # loopback
        iif "lo" accept

        # Oznacit Docker provoz v input ceste (docker-mark-input plni events skript).
        jump docker-mark-input

        # Spolecny Docker -> Tailscale blok.
        jump docker-to-tailscale

        # Verejna expozice sluzeb jde pres centralni allowlist.
        iifname "eth0" ct state new jump internet-services

        # SSH mimo verejny internet nechavame oddelene (napr. tailscale0).
        tcp dport 22 ct state new accept

        # povolit základní ICMP pro IPv4
        ip protocol icmp accept

        # povolit ICMPv6 (nezbytné pro IPv6 neighbor discovery atd.)
        ip6 nexthdr icmpv6 accept

        # LOG a counter pro všechny následné odmítnuté pakety
        # doporučené: rate limit a burst, aby se logy nezaplavily
        limit rate 5/second burst 10 packets log prefix "nftables-drop: " flags all counter
    }

    chain forward {
        type filter hook forward priority filter + 10; policy drop;

        ct state established,related accept

        # Spolecny Docker -> Tailscale blok.
        jump docker-to-tailscale

        # Verejna expozice sluzeb jde pres centralni allowlist i pro Docker.
        iifname "eth0" ct state new jump internet-services

        # Tailscale
        meta mark & $is_tailscale == $is_tailscale accept
        ct mark & $is_tailscale == $is_tailscale accept

        # Docker
        meta mark & $is_docker == $is_docker accept
        ct mark & $is_docker == $is_docker accept

        counter log prefix "nftables-forward-drop: " drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}


table inet nat {
    chain postrouting {
        type nat hook postrouting priority 100;

        # Docker
        oifname "eth0" ct mark & $is_docker == $is_docker masquerade
        oifname "eth0" meta mark & $is_docker == $is_docker masquerade

        # Tailscale
        oifname "eth0" ct mark & $is_tailscale == $is_tailscale masquerade
        oifname "eth0" meta mark & $is_tailscale == $is_tailscale masquerade
    }
}

