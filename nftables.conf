#!/usr/sbin/nft -f

# 1. Pokud tabulka inet filter a nat existuje, tak ji promaž. Pokud ne, vytvoř ji.
add table inet filter
flush table inet filter

add table inet nat
flush table inet nat

table inet filter {
    # Chain plneny events skriptem: nastavuje Docker mark pro pakety z Docker bridge
    # rozhrani v input ceste (Docker child chainy bezi jen na forward hook).
    chain docker-mark-input {
        # pravidla injectovana dynamicky pres nftables-docker-events.service
    }

    chain input {
        type filter hook input priority 0; policy drop;

        # povolit spojení již navázaná nebo related
        ct state established,related accept

        # loopback
        iif "lo" accept

        # Oznacit Docker provoz v input ceste (docker-mark-input plni events skript).
        jump docker-mark-input

        # Blokovat Docker -> Tailscale IP tohoto hostu.
        meta mark & 0x00ff0000 == 0x00050000 ip daddr 100.100.188.1 drop
        meta mark & 0x00ff0000 == 0x00050000 ip6 daddr fd7a:115c:a1e0:188::1 drop

        # povolit SSH (upravit port pokud máš jiný)
        tcp dport 22 ct state new accept

        # povolit web
        tcp dport { 80,443 } ct state new accept
        udp dport 443 ct state new accept

        # povolit prichozi spojeni na openvpn
        udp dport 1201-1205 ct state new accept

        # povolit STUN na HeadScale
        udp dport 3478 accept comment "Povolit Headscale STUN pro NAT Traversal"

        # povolit TailScale WireGuard
        udp dport 41641 accept comment "Tailscale WireGuard"

        # povolit základní ICMP pro IPv4
        ip protocol icmp accept

        # povolit ICMPv6 (nezbytné pro IPv6 neighbor discovery atd.)
        ip6 nexthdr icmpv6 accept

        # LOG a counter pro všechny následné odmítnuté pakety
        # doporučené: rate limit a burst, aby se logy nezaplavily
        limit rate 5/second burst 10 packets log prefix "nftables-drop: " flags all counter
    }

    chain forward {
        type filter hook forward priority filter + 10; policy drop;

        ct state established,related accept

        # Blokovat Docker -> Tailscale (routing pres tailscale0), Docker identifikovan markem.
        oifname "tailscale0" meta mark & 0x00ff0000 == 0x00050000 drop
        oifname "tailscale0" ct mark & 0x00ff0000 == 0x00050000 drop

        # Tailscale
        meta mark & 0x0000ff00 == 0x00000400 accept
        ct mark & 0x0000ff00 == 0x00000400 accept

        # Docker
        meta mark & 0x00ff0000 == 0x00050000 accept
        ct mark & 0x00ff0000 == 0x00050000 accept

        counter log prefix "nftables-forward-drop: " drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}


table inet nat {
    chain postrouting {
        type nat hook postrouting priority 100;

        # Docker
        oifname "eth0" ct mark & 0x00ff0000 == 0x00050000 masquerade
        oifname "eth0" meta mark & 0x00ff0000 == 0x00050000 masquerade

        # Tailscale
        oifname "eth0" ct mark & 0x00ff0000 == 0x00040000 masquerade
        oifname "eth0" meta mark & 0x00ff0000 == 0x00040000 masquerade
    }
}

